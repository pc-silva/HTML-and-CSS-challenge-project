<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login - Desafio HTML e CSS</title>
</head>

<body>
    <main class="container">
        <section class="left">
            <div class="content">
                <h1 class="title">Minha conta</h1>
                <form class="form">
                    <input type="email" placeholder="Digite seu email">
                    <input type="password" placeholder="Digite sua senha">
                    <button>Acessar</button>
                </form>
                <span class="link">Novo por aqui? <a href="signup.html">Cadastre-se.</a></span>
            </div>
        </section>
        <section class="right">
            <div class="content">
                <img src="assets/model.png" alt="imagem das informações">
                <div class="content-info">
                    <h2 class="subtitle">
                        Leve sua carreira ao próximo nível.
                    </h2>
                    <p class="info">
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Egestas fermentum nibh volutpat turpis
                        orci
                        pharetra euismod quam non.
                    </p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
