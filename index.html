<html lang="pt-br">

        <div class="column left">
            <div class="column-login">
                <h1>Minha conta</h1>

                    <input type="password" name="password" placeholder="Digite sua senha">

                </form>
                <p>Novo por aqui? <a href="signup.html">Cadastre-se.</a></p>
            </div>
        </div>
        <div class="column right">
            <div class="column-info">
                <div class="img-info">
                    <img src="assets/model.png" alt="imagem do modelo de arquivos">
                </div>
               <div class="text-info">
                    <h2>Leve sua carreira ao próximo nível.</h2>
                    <p>
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ut, optio mollitia facilis nam deserunt recusandae aliquid libero iure ipsa quidem.
                    </p>

</html>
